name: MovieADR
options:
  bundleIdPrefix: com.movieadr
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
settings:
  base:
    SWIFT_VERSION: "5.10"
targets:
  MovieADR:
    type: application
    platform: [iOS, macOS]
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.movieadr.app
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "MovieADR needs microphone access to record your dialogue"
        INFOPLIST_KEY_NSDocumentsFolderUsageDescription: "MovieADR needs access to your documents to import and export videos"
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: false
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "-"
        Release:
          CODE_SIGN_IDENTITY: "-"
    dependencies:
      - package: WhisperKit
      - package: demucs-mlx-swift
        product: DemucsMLX
    entitlements:
      path: MovieADR.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.device.audio-input: true
        com.apple.security.device.microphone: true
        com.apple.security.network.client: true
        com.apple.security.files.downloads.read-write: true
# NOTE: GPU validation is disabled in the generated xcscheme files
# (enableGPUValidationMode=0, enableGPUFrameCaptureMode=3).
# xcodegen does not support these keys natively, so they are set
# directly in the xcscheme XML files under xcshareddata/xcschemes/.
schemes:
  MovieADR_macOS:
    build:
      targets:
        MovieADR_macOS: all
    run:
      config: Debug
      diagnostics:
        mainThreadChecker: true
      environmentVariables:
        - variable: MTL_DEBUG_LAYER
          value: "0"
          isEnabled: true
  MovieADR_iOS:
    build:
      targets:
        MovieADR_iOS: all
    run:
      config: Debug
      diagnostics:
        mainThreadChecker: true
      environmentVariables:
        - variable: MTL_DEBUG_LAYER
          value: "0"
          isEnabled: true
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: "0.9.0"
  demucs-mlx-swift:
    url: https://github.com/kylehowells/demucs-mlx-swift
    branch: master
